<!DOCTYPE html>
<html lang="en">
<head>
    <!--Logo-->
<img src="images/HW 1 Logo.png" alt="Beacon Medical Logo" class="Logo">
</form>
    <meta charset="UTF-8">
    <title>Beacon Medical Patient Form</title>
</head>

<body>

<header>
    <h1>Beacon Medical</h1>
    <p>Patient Registration Form</p>
</header>

<form>
    <h2>Personal Information</h2>

        <!-- Username -->
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter username">
        
        <!--Password-->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password">

        <label for="confirmPassword">Re-enter Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>

         <button type="submit">Submit</button>
        <br><br>
        <!--Name-->
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName">

        <label for="middleInitial">M.I:</label>
        <input type="text" id="middleInitial" name="middleInitial" maxlength="1" size="2">

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName">
        <br><br>
        <!-- Sex (Radio Buttons) and DOB -->
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <label>Sex:</label>
        <input type="radio" id="male" name="sex" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="sex" value="female">
        <label for="female">Female</label>  
        <input type="radio" id="other" name="sex" value="other">
        <label for="other">Other</label>
        <br><br>
        <!-- SSN -->
        <label for="ssn">SSN:</label>
        <input type="text" id="ssn" name="ssn" placeholder="XXX-XX-XXXX">
        <br><br>
        <!-- Address -->
        <label for="address">Address:</label>
        <input type="text" id="address" name="address">

        <label for="city">City:</label>
        <input type="text" id="city" name="city">
</select>

<label for="zip">ZIP:</label>
<input type="text" id="Zip" name="zip" maxlength="10">
        <!-- State Dropdown -->
        <label for="state">State:</label>
        <select id="state" name="state">
    <option value="">-- Select State --</option>

    <option value="AL">Alabama</option>
    <option value="AK">Alaska</option>
    <option value="AZ">Arizona</option>
    <option value="AR">Arkansas</option>
    <option value="CA">California</option>
    <option value="CO">Colorado</option>
    <option value="CT">Connecticut</option>
    <option value="DE">Delaware</option>
    <option value="FL">Florida</option>
    <option value="GA">Georgia</option>
    <option value="HI">Hawaii</option>
    <option value="ID">Idaho</option>
    <option value="IL">Illinois</option>
    <option value="IN">Indiana</option>
    <option value="IA">Iowa</option>
    <option value="KS">Kansas</option>
    <option value="KY">Kentucky</option>
    <option value="LA">Louisiana</option>
    <option value="ME">Maine</option>
    <option value="MD">Maryland</option>
    <option value="MA">Massachusetts</option>
    <option value="MI">Michigan</option>
    <option value="MN">Minnesota</option>
    <option value="MS">Mississippi</option>
    <option value="MO">Missouri</option>
    <option value="MT">Montana</option>
    <option value="NE">Nebraska</option>
    <option value="NV">Nevada</option>
    <option value="NH">New Hampshire</option>
    <option value="NJ">New Jersey</option>
    <option value="NM">New Mexico</option>
    <option value="NY">New York</option>
    <option value="NC">North Carolina</option>
    <option value="ND">North Dakota</option>
    <option value="OH">Ohio</option>
    <option value="OK">Oklahoma</option>
    <option value="OR">Oregon</option>
    <option value="PA">Pennsylvania</option>
    <option value="RI">Rhode Island</option>
    <option value="SC">South Carolina</option>
    <option value="SD">South Dakota</option>
    <option value="TN">Tennessee</option>
    <option value="TX">Texas</option>
    <option value="UT">Utah</option>
    <option value="VT">Vermont</option>
    <option value="VA">Virginia</option>
    <option value="WA">Washington</option>
    <option value="WV">West Virginia</option>
    <option value="WI">Wisconsin</option>
    <option value="WY">Wyoming</option>

    <!-- Territories -->
    <option value="DC">District of Columbia</option>
    <option value="PR">Puerto Rico</option>
</select>
<br><br>
    <!--Contact Information-->
    <h3>Contact Information</h3>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone">

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email">

    <!--Med Info-->
    <h3>Medical Information</h3>

    <!-- Insurance -->

    <label>Are you insured?</label>

    <input type="radio" id="insuredYes" name="insured" value="yes">
    <label for="insuredYes">Yes</label>

    <input type="radio" id="insuredNo" name="insured" value="no">
    <label for="insuredNo">No</label>
    <input type="text" name="provider" maxlength="30">

    <br><br>
</select>

    <!-- Vaccinated -->

    <label>Are you vaccinated?</label>
    <input type="radio" id="vaccinatedYes" name="vaccinated" value="yes">
    <label for="vaccinatedYes">Yes</label>
    <input type="radio" id="vaccinatedNo" name="vaccinated" value="no">
    <label for="vaccinatedNo">No</label>
    <br><br>

    <!-- Vaccine Checkboxes -->

    <label>Vaccines Received:</label><br>

    <input type="checkbox" id="flu" name="vaccines" value="flu">
    <label for="flu">Influenza (Flu)</label><br>

    <input type="checkbox" id="covid" name="vaccines" value="covid">
    <label for="covid">COVID-19</label><br>

    <input type="checkbox" id="hepb" name="vaccines" value="hepb">
    <label for="hepb">Hepatitis B</label><br>

    <input type="checkbox" id="tdap" name="vaccines" value="tdap">
    <label for="tdap">Tdap</label><br>
    <br>

    <!-- Health Rating -->

    <label for="healthRating">Current Health Rating (1-10):</label>

    <select id="healthRating" name="healthRating">
        <option value="">Select Rating</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
    </select>

<!--Symptoms-->
    <h3>Symptoms</h3>

    <label>Select all symptoms that apply:</label><br><br>

    <input type="checkbox" id="fever" name="symptoms" value="fever">
    <label for="fever">Fever</label><br>

    <input type="checkbox" id="cough" name="symptoms" value="cough">
    <label for="cough">Cough</label><br>

    <input type="checkbox" id="headache" name="symptoms" value="headache">
    <label for="headache">Headache</label><br>

    <input type="checkbox" id="fatigue" name="symptoms" value="fatigue">
    <label for="fatigue">Fatigue</label><br>

    <input type="checkbox" id="nausea" name="symptoms" value="nausea">
    <label for="nausea">Nausea</label><br>

    <input type="checkbox" id="congestion" name="symptoms" value="congestion">
    <label for="congestion">Congestion</label><br><br>

    <label for="additionalSymptoms">
        Please list any additional symptoms not shown above:
    </label><br>

    <textarea id="additionalSymptoms"
              name="additionalSymptoms"
              rows="4"
              cols="50"
              placeholder="Describe any additional symptoms here..."></textarea>
            
    <!--Footer-->
    <footer>
    <div id="footer">
        <p>Houston Medical</p>
        <p>P.O Box 55555<br>
        <p>Houston, TX 77030</p>

        <button type="button">
            Contact Us
        </button>
    </div>
    </footer>


</body>
</html>
